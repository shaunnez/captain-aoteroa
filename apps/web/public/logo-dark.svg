<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <rect width="300" height="80" fill="#000000"/>

  <!--
    Owl centred at (38, 38) in canvas space.
    All coordinates below are in OWL-LOCAL space (origin = owl centre).
    SVG y-axis points DOWN.

    Geometry notes:
      Head:      circle r=17, centre (0,0)
      Left eye:  centre (-6.5, -6)
      Right eye: centre (+6.5, -6)
      Body:      teardrop below head
      Wings:     koru arcs to each side of head, fully outside r=17

    Koru arcs (mathematically verified):
      Left:  M -20,-18  A 8,8 0 1,1 -28,-10  A 6,6 0 0,0 -20,-6
             Start(-20,-18)→end(-28,-10): dist=11.3 ≤ 2×8=16 ✓
             Start(-28,-10)→end(-20,-6):  dist=8.9  ≤ 2×6=12 ✓
      Right: mirror of left (swap sweep flags)
  -->
  <g transform="translate(38,38)" fill="none" stroke="#ffffff"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- ══ BODY ══ -->
    <path d="M -9,15 C -11,21 -10,30 -8,35 C -5,39 -2,41 0,41
             C 2,41 5,39 8,35 C 10,30 11,21 9,15"
          stroke-width="1.25"/>

    <!-- ══ HEAD ══ -->
    <circle cx="0" cy="0" r="17" stroke-width="1.3"/>

    <!-- ══ FACIAL DISC (subtle inner oval) ══ -->
    <ellipse cx="0" cy="-1" rx="11" ry="13" stroke-width="0.8"/>

    <!-- ══ LEFT EYE ══ -->
    <circle cx="-6.5" cy="-6" r="6.5"  stroke-width="1.25"/>
    <circle cx="-6.5" cy="-6" r="4.5"  stroke-width="0.9"/>
    <circle cx="-6.5" cy="-6" r="2"    fill="#ffffff" stroke="none"/>

    <!-- ══ RIGHT EYE ══ -->
    <circle cx="6.5"  cy="-6" r="6.5"  stroke-width="1.25"/>
    <circle cx="6.5"  cy="-6" r="4.5"  stroke-width="0.9"/>
    <circle cx="6.5"  cy="-6" r="2"    fill="#ffffff" stroke="none"/>

    <!-- ══ BEAK ══ -->
    <path d="M -2.5,4 L 0,8.5 L 2.5,4" stroke-width="1.1"/>

    <!-- ══ LEFT WING (outer crescent) ══ -->
    <!-- Sweeps from body-side at (-9,15) out left, then back to head at (-14,-12) -->
    <path d="M -9,15 C -22,10 -30,0 -28,-12 C -27,-22 -18,-26 -14,-18"
          stroke-width="1.25"/>

    <!-- ══ LEFT KORU SPIRAL ══
         Outer arc: 270° CW from (-20,-18) → (-28,-10)
         Inner coil: small CCW arc from (-28,-10) → (-20,-6)
         Together they form a snail-shell spiral opening upward/right
    -->
    <path d="M -20,-18
             A 8,8 0 1,1 -28,-10
             A 6,6 0 0,0 -20,-6"
          stroke-width="1.15"/>
    <!-- Koru tail tip (short curl at the stem) -->
    <path d="M -20,-18 C -18,-22 -15,-21 -15,-18" stroke-width="0.9"/>

    <!-- ══ RIGHT WING (outer crescent) ══ -->
    <path d="M 9,15 C 22,10 30,0 28,-12 C 27,-22 18,-26 14,-18"
          stroke-width="1.25"/>

    <!-- ══ RIGHT KORU SPIRAL ══ (exact mirror) -->
    <path d="M 20,-18
             A 8,8 0 1,0 28,-10
             A 6,6 0 0,1 20,-6"
          stroke-width="1.15"/>
    <path d="M 20,-18 C 18,-22 15,-21 15,-18" stroke-width="0.9"/>

    <!-- ══ CHEST FEATHER LINES ══ -->
    <path d="M  -5,16 Q 0,14   5,16" stroke-width="0.8"/>
    <path d="M  -7,21 Q 0,19   7,21" stroke-width="0.8"/>
    <path d="M  -8,26 Q 0,24   8,26" stroke-width="0.8"/>
    <path d="M  -7,31 Q 0,29   7,31" stroke-width="0.8"/>
    <path d="M  -5,36 Q 0,34   5,36" stroke-width="0.8"/>

    <!-- ══ FEET ══ -->
    <path d="M -4,40 L -7,44 M -4,40 L -2,44 M -4,40 L 1,43"  stroke-width="1"/>
    <path d="M  4,40 L  1,44 M  4,40 L  6,44 M  4,40 L 9,43"  stroke-width="1"/>

  </g>

  <!-- Separator -->
  <line x1="90" y1="14" x2="90" y2="66"
        stroke="#ffffff" stroke-width="0.4" stroke-dasharray="none" opacity="0.25"/>

  <!-- ══ TEXT: HearMe NZ — right of owl, vertically centred ══ -->
  <g transform="translate(103,40)" fill="#ffffff"
     font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text y="-10" font-size="18" font-weight="300" letter-spacing="3">HearMe</text>
    <text y="11"  font-size="12" font-weight="600" letter-spacing="8">NZ</text>
  </g>

</svg>
