<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76" width="76" height="76">
  <rect width="76" height="76" rx="12" fill="#493276"/>

  <!--
    Owl centred at (38, 38) — same local coordinate system as logo-dark.svg
  -->
  <g transform="translate(38,38)" fill="none" stroke="#ffffff"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- BODY -->
    <path d="M -9,15 C -11,21 -10,30 -8,35 C -5,39 -2,41 0,41
             C 2,41 5,39 8,35 C 10,30 11,21 9,15"
          stroke-width="1.25"/>

    <!-- HEAD -->
    <circle cx="0" cy="0" r="17" stroke-width="1.3"/>

    <!-- FACIAL DISC -->
    <ellipse cx="0" cy="-1" rx="11" ry="13" stroke-width="0.8"/>

    <!-- LEFT EYE -->
    <circle cx="-6.5" cy="-6" r="6.5"  stroke-width="1.25"/>
    <circle cx="-6.5" cy="-6" r="4.5"  stroke-width="0.9"/>
    <circle cx="-6.5" cy="-6" r="2"    fill="#ffffff" stroke="none"/>

    <!-- RIGHT EYE -->
    <circle cx="6.5"  cy="-6" r="6.5"  stroke-width="1.25"/>
    <circle cx="6.5"  cy="-6" r="4.5"  stroke-width="0.9"/>
    <circle cx="6.5"  cy="-6" r="2"    fill="#ffffff" stroke="none"/>

    <!-- BEAK -->
    <path d="M -2.5,4 L 0,8.5 L 2.5,4" stroke-width="1.1"/>

    <!-- LEFT WING -->
    <path d="M -9,15 C -22,10 -30,0 -28,-12 C -27,-22 -18,-26 -14,-18"
          stroke-width="1.25"/>

    <!-- LEFT KORU SPIRAL -->
    <path d="M -20,-18
             A 8,8 0 1,1 -28,-10
             A 6,6 0 0,0 -20,-6"
          stroke-width="1.15"/>
    <path d="M -20,-18 C -18,-22 -15,-21 -15,-18" stroke-width="0.9"/>

    <!-- RIGHT WING -->
    <path d="M 9,15 C 22,10 30,0 28,-12 C 27,-22 18,-26 14,-18"
          stroke-width="1.25"/>

    <!-- RIGHT KORU SPIRAL -->
    <path d="M 20,-18
             A 8,8 0 1,0 28,-10
             A 6,6 0 0,1 20,-6"
          stroke-width="1.15"/>
    <path d="M 20,-18 C 18,-22 15,-21 15,-18" stroke-width="0.9"/>

    <!-- CHEST FEATHER LINES -->
    <path d="M  -5,16 Q 0,14   5,16" stroke-width="0.8"/>
    <path d="M  -7,21 Q 0,19   7,21" stroke-width="0.8"/>
    <path d="M  -8,26 Q 0,24   8,26" stroke-width="0.8"/>
    <path d="M  -7,31 Q 0,29   7,31" stroke-width="0.8"/>
    <path d="M  -5,36 Q 0,34   5,36" stroke-width="0.8"/>

    <!-- FEET -->
    <path d="M -4,40 L -7,44 M -4,40 L -2,44 M -4,40 L 1,43"  stroke-width="1"/>
    <path d="M  4,40 L  1,44 M  4,40 L  6,44 M  4,40 L 9,43"  stroke-width="1"/>

  </g>
</svg>
