services:
  - type: web
    name: caption-aotearoa-api
    runtime: node
    rootDir: apps/api
    buildCommand: pnpm install && pnpm --filter api build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PRESENTER_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
